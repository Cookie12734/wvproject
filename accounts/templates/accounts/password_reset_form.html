{% extends 'base.html' %}

{% block title %}パスワードリセット - VALORANT募集掲示板{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card">
            <div class="card-header text-center">
                <h4 class="mb-0"><i class="bi bi-key"></i> パスワードリセット</h4>
            </div>
            <div class="card-body">
                <p class="text-muted mb-4">
                    登録したメールアドレスを入力してください。<br>
                    パスワード再設定用のリンクをお送りします。
                </p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_email" class="form-label">メールアドレス</label>
                        <input type="email" name="email" class="form-control" id="id_email" required autofocus placeholder="example@email.com">
                    </div>
                    {% if form.errors %}
                    <div class="alert alert-danger">
                        入力内容を確認してください。
                    </div>
                    {% endif %}
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-envelope"></i> リセットメールを送信
                    </button>
                </form>
            </div>
            <div class="card-footer text-center py-3">
                <a href="{% url 'accounts:login' %}" class="text-decoration-none" style="color: var(--val-red);">
                    <i class="bi bi-arrow-left"></i> ログインに戻る
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
