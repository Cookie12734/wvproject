{% extends 'base.html' %}

{% block title %}ログイン - ゲーム募集掲示板{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card">
            <div class="card-header text-center">
                <h4 class="mb-0"><i class="bi bi-box-arrow-in-right"></i> ログイン</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label">ユーザー名</label>
                        <input type="text" name="username" class="form-control" id="id_username" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label">パスワード</label>
                        <input type="password" name="password" class="form-control" id="id_password" required>
                    </div>
                    {% if form.errors %}
                    <div class="alert alert-danger">
                        ユーザー名またはパスワードが正しくありません。
                    </div>
                    {% endif %}
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right"></i> ログイン
                    </button>
                    <div class="text-center mt-3">
                        <a href="{% url 'accounts:password_reset' %}" class="text-muted small text-decoration-none">
                            <i class="bi bi-question-circle"></i> パスワードをお忘れですか？
                        </a>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center py-3">
                <span class="text-muted">アカウントをお持ちでない方は</span>
                <a href="{% url 'accounts:signup' %}" class="text-decoration-none ms-1" style="color: var(--val-red);">
                    <i class="bi bi-person-plus"></i> 新規登録
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
