{% extends 'base.html' %}

{% block title %}登録完了 - ゲーム募集掲示板{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body text-center">
                <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
                <h3 class="mt-3">登録が完了しました！</h3>
                <p class="text-muted">アカウントが正常に作成されました。ログインしてゲーム募集を始めましょう！</p>
                <a href="{% url 'accounts:login' %}" class="btn btn-primary mt-2">
                    <i class="bi bi-box-arrow-in-right"></i> ログインする
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
