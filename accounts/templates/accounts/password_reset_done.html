{% extends 'base.html' %}

{% block title %}メール送信完了 - VALORANT募集掲示板{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card">
            <div class="card-header text-center">
                <h4 class="mb-0"><i class="bi bi-envelope-check"></i> メール送信完了</h4>
            </div>
            <div class="card-body text-center py-4">
                <i class="bi bi-check-circle text-success" style="font-size: 4rem;"></i>
                <h5 class="mt-3">パスワードリセットメールを送信しました</h5>
                <p class="text-muted mt-3">
                    入力されたメールアドレスが登録されている場合、<br>
                    パスワード再設定用のリンクが記載されたメールをお送りしました。
                </p>
                <div class="alert alert-info mt-3">
                    <i class="bi bi-info-circle"></i>
                    メールが届かない場合は、迷惑メールフォルダを確認するか、<br>
                    入力したメールアドレスが正しいかご確認ください。
                </div>
            </div>
            <div class="card-footer text-center py-3">
                <a href="{% url 'accounts:login' %}" class="text-decoration-none" style="color: var(--val-red);">
                    <i class="bi bi-arrow-left"></i> ログインに戻る
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
