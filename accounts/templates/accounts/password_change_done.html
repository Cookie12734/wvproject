{% extends 'base.html' %}

{% block title %}パスワード変更完了 - VALORANT募集掲示板{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0"><i class="bi bi-check-circle"></i> パスワード変更完了</h4>
            </div>
            <div class="card-body text-center">
                <div class="mb-4">
                    <i class="bi bi-shield-check text-success" style="font-size: 4rem;"></i>
                </div>
                <h5 class="mb-3">パスワードが正常に変更されました</h5>
                <p class="text-muted mb-4">
                    新しいパスワードで次回からログインしてください。
                </p>
                <div class="d-grid gap-2">
                    <a href="{% url 'accounts:mypage' %}" class="btn btn-primary">
                        <i class="bi bi-person-circle"></i> マイページに戻る
                    </a>
                    <a href="{% url 'wvapp:index' %}" class="btn btn-outline-secondary">
                        <i class="bi bi-house"></i> トップページへ
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
