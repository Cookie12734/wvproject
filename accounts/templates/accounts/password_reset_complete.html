{% extends 'base.html' %}

{% block title %}パスワード変更完了 - VALORANT募集掲示板{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card">
            <div class="card-header text-center">
                <h4 class="mb-0"><i class="bi bi-check-circle"></i> パスワード変更完了</h4>
            </div>
            <div class="card-body text-center py-4">
                <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
                <h5 class="mt-3">パスワードが変更されました</h5>
                <p class="text-muted mt-3">
                    新しいパスワードでログインできます。
                </p>
                <a href="{% url 'accounts:login' %}" class="btn btn-primary btn-lg mt-3">
                    <i class="bi bi-box-arrow-in-right"></i> ログインする
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
